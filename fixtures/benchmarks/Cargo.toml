[package]
name = "uniffi-fixture-benchmarks"
edition = "2021"
version = "0.22.0"
license = "MPL-2.0"
publish = false

[lib]
crate-type = ["lib", "cdylib"]
name = "uniffi_benchmarks"
bench = false

[dependencies]
uniffi = { path = "../../uniffi", default-features = false }
uniffi_bindgen = {path = "../../uniffi_bindgen", features = ["bindgen-tests", "test-util"]}
uniffi-bindgen-kotlin-jni = {path = "../../uniffi-bindgen-kotlin-jni", features = ["test-util"]}
uniffi-bindgen-kotlin-jni-runtime = {path = "../../uniffi-bindgen-kotlin-jni/runtime", optional = true}
anyhow = "1"
camino = "1"
clap = { version = "4", features = ["cargo", "std", "derive"] }
criterion = "0.5.1"
regex = "1.5.1"
serde_json = "1"
thiserror = "2"

[build-dependencies]
uniffi-bindgen-kotlin-jni = {path = "../../uniffi-bindgen-kotlin-jni"}

[[bench]]
name = "benchmarks"
harness = false

[features]
ffi-trace = ["uniffi/ffi-trace"]
uniffi-bindgen = ["uniffi/macro-scaffolding"]
uniffi-bindgen-kotlin-jni = ["uniffi-bindgen-kotlin-jni-runtime"]
default = ["uniffi-bindgen"]
