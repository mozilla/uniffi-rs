[package]
name = "uniffi-fixture-mut-bytes"
version = "0.22.0"
edition = "2021"
license = "MPL-2.0"
publish = false

[lib]
name = "uniffi_mut_bytes"
crate-type = ["lib", "cdylib"]

[dependencies]
uniffi = { workspace = true }

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }

[dev-dependencies]
uniffi = { workspace = true, features = ["bindgen-tests"] }

[features]
ffi-trace = ["uniffi/ffi-trace"]
