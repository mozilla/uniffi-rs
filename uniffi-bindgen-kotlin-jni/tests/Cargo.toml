[package]
name = "uniffi-bindgen-kotlin-jni-tests"
version = "0.31.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
uniffi-bindgen-tests = { path = "../../bindgen-tests/lib", default-features = false, features = ["simple_fns", "primitive_types", "records", "enums", "compound_types", "interfaces", "custom_types", "errors", "callback_interfaces", "futures", "trait_interfaces"] }
uniffi-bindgen-tests-external-types-source = { path = "../../bindgen-tests/external-types" }
uniffi-bindgen-kotlin-jni-runtime = { path = "../runtime" }

[build-dependencies]
uniffi-bindgen-kotlin-jni = { path = ".." }

[dev-dependencies]
camino = "1"
glob = "0.3"
uniffi-bindgen-kotlin-jni = { path = ".." }
